<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2 style="text-align: center"><u>STUDENT FORM</u></h2>
    <form
      style="background-color: rgb(146, 100, 252); color: white"
      action="/HTML/Forms/actionpage.html"
    >
      <table>
        <tr>
          <td><label for="fname">First Name</label></td>
          <td>
            <input type="text" name="fname" placeholder="Enter Your Name" />
            (max 30 character a-z and A-Z)
          </td>
        </tr>
        <tr>
          <td><label for="lname">Last Name</label></td>
          <td>
            <input type="text" name="lname" placeholder="Enter Your Name" />
            (max 30 character a-z and A-Z)
          </td>
        </tr>
        <tr>
          <td><label for="dob">Date Of Birth</label></td>
          <td><input type="date" name="dob" /></td>
        </tr>
        <tr>
          <td><label for="email">Email ID</label></td>
          <td><input type="email" name="email" id="email" /></td>
        </tr>

        <tr>
          <td><label for="phone">Phone Number</label></td>
          <td><input type="number" name="phone" id="" phone /> (10 Digit)</td>
        </tr>

        <tr>
          <td><label for="gender">Gender</label></td>
          <td>
            <input type="radio" name="gender" id="male" />Male
            <input type="radio" name="gender" id="female" />Female
          </td>
        </tr>

        <tr>
          <td><label for="address">Address</label></td>
          <td><textarea rows="5" cols="25"></textarea></td>
        </tr>
        <tr>
          <td><label for="city">City</label></td>
          <td>
            <input type="text" name="city" id="city" /> (max 30 character)
          </td>
        </tr>

        <tr>
          <td><label for="pincode">Pin Code</label></td>
          <td><input type="text" name="pincode" id="pincode" /> (6 digit)</td>
        </tr>
        <tr>
          <td><label for="state">State</label></td>
          <td>
            <input type="text" name="state" id="state" /> (max 30 character)
          </td>
        </tr>
        <tr>
          <td><label for="country">Country</label></td>
          <td>
            <input
              type="text"
              name="country"
              id="country"
              placeholder="India"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="hobbies">Hobbies</label>
          </td>
          <td>
            <input type="checkbox" name="hobbies" id="hobbies1" />Drawing
            <input type="checkbox" name="hobbies" id="hobbies2" />Swiming
            <input type="checkbox" name="hobbies" id="hobbies3" />Reading
            <input type="checkbox" name="hobbies" id="hobbies4" />
            <input type="text" name="hobbies" id="hobbies4" />
          </td>
        </tr>
        <tr>
          <td><label for="qualification">Qualification</label></td>
          <td>
            <table style="border-collapse: collapse; border: solid black">
              <tr>
                <th>Sr.NO</th>
                <th>Examination</th>
                <th>Board</th>
                <th>Percentage</th>
                <th>Year OF Passing</th>
              </tr>
              <tr>
                <td>1</td>
                <td>Class X</td>
                <td><input type="text" name="classX_board" id="" /></td>
                <td><input type="text" name="classX_percentage" id="" /></td>
                <td><input type="text" name="classX_yearofpassing" id="" /></td>
              </tr>
              <tr>
                <td>2</td>
                <td>Class XII</td>
                <td><input type="text" name="classXII_board" id="" /></td>
                <td><input type="text" name="classXII_percentage" id="" /></td>
                <td>
                  <input type="text" name="classXII_yearofpassing" id="" />
                </td>
              </tr>
              <tr>
                <td>3</td>
                <td>Masters</td>
                <td><input type="text" name="masters_board" id="" /></td>
                <td><input type="text" name="masters_percentage" id="" /></td>
                <td>
                  <input type="text" name="masters_yearofpassing" id="" />
                </td>
              </tr>
              <tr>
                <td>4</td>
                <td>Graduation</td>
                <td><input type="text" name="graduation_board" id="" /></td>
                <td>
                  <input type="text" name="graduation_percentage" id="" />
                </td>
                <td>
                  <input type="text" name="graduation_yearofpassing" id="" />
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>
          <td><label for="coures">Courses Applied for:</label></td>
          <td>
            <input type="radio" name="course" id="course" />BCA
            <input type="radio" name="course" id="course" />B.COM
            <input type="radio" name="course" id="course" />MCA
          </td>
        </tr>
        <tr>
          <td></td>
          <td align="center">
            <input type="submit" value="submit" />
            <input type="reset" value=" reset" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>

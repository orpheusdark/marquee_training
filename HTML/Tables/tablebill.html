<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BILL</title>

    <style>
    td,
      th {
        border: 1px solid;
        padding: 5px;
        
      }
      table {
        border-collapse: collapse;
        border: solid black;
      }
      p {
        margin-right: 150px;    
        margin-top: 0px;
        margin-bottom: 0px;
      }
      
      
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th colspan="2">Invoice #4653464</th>
          <th colspan="2">14 January 2025</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="2">
            <p>
              <b>Pay to:</b><br />
              Acme Billing Co. <br />
              123 Main St. <br />
              Cityville 65458
            </p>
          </td>
          <td colspan="2">
            <p>
              <b>Customer:</b><br />
              John Smith <br />
              187 Wilow <br />
              SouthEast MA 15488
            </p>
          </td>
        </tr>

        <tr>
          <th style="text-align: left;">Name/ Description</th>
          <th>Qty</th>
          <th>@</th>
          <th>Cost</th>
        </tr>

        <tr style="text-align: center;">
          <td style="text-align: left;">Paper Clips</td>
          <td>1000</td>
          <td>0.1</td>
          <td>10.00</td>
        </tr>
        <tr style="text-align: center;">
          <td style="text-align: left;">Staples(box)</td>
          <td>1000</td>
          <td>1.00</td>
          <td>100</td>
        </tr>
        <tr>
          <th colspan="3" style="text-align: right;">Subtotal</th>
          <td colspan="2">110.00</td>
        </tr>

        <tr style="text-align: center;">
          <th colspan="2" style="text-align: right;">Tax</th>
          <td>8%</td>
          <td>8.80</td>
        </tr>

        <tr>
          <th colspan="3" style="text-align: right;">Grand Total</th>
          <th>$118.80</th>
        </tr>
      </tbody>
    </table>
  </body>
</html>

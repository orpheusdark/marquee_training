<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Practice 30/06/2026</title>
    <style>
         td,th {
            border : 1px solid;
            padding: 5px;
        } 
        table {
            border-collapse: collapse;
        }
        thead {
            background:rgb(240, 255, 209);
        }
    </style>
  </head>
  <body>
    <table>
        <colgroup>
        <col style="background-color: rgb(195, 151, 97);">
        <col style="background-color: rgb(21, 164, 169) ;">
        <col style="background-color: rgb(113, 113, 113);">
        <col style="background-color: #a6a6a6 ;">
        </colgroup>

      <caption>
        Employee Data
      </caption>
      <thead>
        <tr>
          <th>Emp Code</th>
          <th>Emp Name</th>
          <th>Job Title</th>
          <th>Salary (LPA)</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>79985</td>
          <td>Suresh</td>
          <td>Operator</td>
          <td>5</td>
        </tr>
        <tr>
          <td>74699</td>
          <td>Ramesh</td>
          <td>Engineer</td>
          <td rowspan="2">9</td>
        </tr>
        <tr>
          <td>65448</td>
          <td>Mahesh</td>
          <td>Automation</td>
          
        </tr>
        <tr>
          <td>78488</td>
          <td>Kumar</td>
          <td>Operator</td>
          <td>6</td>
        </tr>
      </tbody>
      <tfoot>
        <tr style="text-align: center;">
          <td colspan="4">This Is Footer</td>
        </tr>
      </tfoot>
    </table>

    <br>

    <table>
        <tr>
            <td rowspan="3">h1</td>
            <td>h1</td>
            <td>h1</td>            
            <td colspan="3" style="text-align: center;">h1</td>
        </tr>
        <tr>       
            <td>h2</td>
           
            <td colspan="3" style="text-align: center;">h2</td>
            <td>h2</td>
            
        </tr>
        <tr>
            <td colspan="3" style="text-align: center;">h3</td>
            <td>h3</td>
            <td>h3</td>
                      
        </tr>
    </table>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orderlist</title>
</head>
<body>
    <details>
        <summary>My Material List</summary>

        <section>
            <details>
                <summary>Stationery Items</summary>
                <img src="https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=1000&q=80" width="500" height="333" alt="Stationery items">
                <ol>
                    <li>Pencil</li>
                    <li>Eraser</li>
                    <li>Highlighter</li>
                    <li>Glue</li>
                    <li>Scissors</li>
                </ol>
            </details>
        </section>

        <section>
            <details>
                <summary>Eatables</summary>
                <img src="https://therunningadvisor.com/wp-content/uploads/2024/03/conveniently-order-healthy-snacks-delivered-to-your-door-1709725311.jpg" width="500" height="333" alt="Healthy snacks">
                <ol>
                    <li>Apple</li>
                    <li>Banana</li>
                    <li>Orange</li>
                    <li>Grapes</li>
                    <li>Mango</li>
                </ol>
            </details>
        </section>

        <section>
            <details>
                <summary>Decor Items</summary>
                <img src="https://images.squarespace-cdn.com/content/v1/63eb5f9af0cd1537444d8356/1707406762868-LUSMW9L81T4IFA1C29OD/1.jpg" width="500" height="333" alt="Decor items">
                <ol>
                    <li>Flower Vase</li>
                    <li>Picture Frame</li>
                    <li>Candle Holder</li>
                    <li>Throw Pillow</li>
                    <li>Wall Art</li>
                </ol>
            </details>
        </section>

</html>
